{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card hero-card p-4">
            <h2 class="mb-3">Verify OTP</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-success w-100" type="submit">Verify</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
