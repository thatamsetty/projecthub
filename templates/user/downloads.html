{% extends 'base.html' %}
{% block content %}
<div class="card panel-card p-4">
    <h2 class="mb-3">Downloads</h2>
    {% for item in completed_projects %}
        <div class="d-flex justify-content-between align-items-center border rounded p-3 mb-3">
            <div>
                <h5 class="mb-1">{{ item.project.title }}</h5>
                <p class="mb-0 text-muted">Delivery unlocked after successful final payment.</p>
            </div>
            <a href="{{ item.delivery_url }}" target="_blank" class="btn btn-dark">Download</a>
        </div>
    {% empty %}
        <p class="text-muted mb-0">No downloadable deliverables yet.</p>
    {% endfor %}
</div>
{% endblock %}
