{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card panel-card p-4">
            <h2 class="mb-3">Submit Project Request</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-dark" type="submit">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
