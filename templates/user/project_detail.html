{% extends 'base.html' %}
{% block content %}
<div class="card panel-card p-4">
    <h2>{{ project.title }}</h2>
    <p class="text-muted">{{ project.tech_stack }}</p>
    <p>{{ project.description }}</p>
    <p><strong>Base Price:</strong> Rs. {{ project.base_price }}</p>
    <a href="/submit/?project_id={{ project.id }}" class="btn btn-dark">Submit Request</a>
</div>
{% endblock %}
